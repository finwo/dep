name: Setup DEP package manager
description: Installs the DEP package manager into the runner

outputs:
  artifact-url:
    description: "URL of the artifact from this action's release"
    value: ${{ format('https://github.com/{0}/releases/download/{1}/dep-{2}-{3}.zip',
                     'finwo/dep',
                     replace(github.action_ref, '^refs/tags/', ''),
                     runner.os,
                     runner.arch) }}

runs:
  using: composite
  steps:
    - name: Determine platform artifact name
      id: platform
      shell: bash
      run: |
        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')

        ARTIFACT_NAME="dep-${OS}-${ARCH}"

        echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

    - name: Download prebuilt binary
      id: download
      shell: bash
      run: |
        ARTIFACT="${{ steps.platform.outputs.artifact_name }}"
        TAG="${{ replace(github.action_ref, '^refs/tags/', '') }}"
        if [ -z "$TAG" ]; then
          TAG="main"
        fi

        mkdir -p "${GITHUB_ACTION_PATH}/dist"

        DOWNLOAD_URL="https://github.com/finwo/dep/releases/download/${TAG}/${ARTIFACT}"

        if curl -sI "$DOWNLOAD_URL" | head -1 | grep -q "200"; then
          echo "Downloading $ARTIFACT from release $TAG"
          curl -sL "$DOWNLOAD_URL" -o "${GITHUB_ACTION_PATH}/dist/dep"
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "Prebuilt binary not found for $ARTIFACT in release $TAG, will build from source"
          echo "status=fallback" >> $GITHUB_OUTPUT
        fi

    - name: Build from source (fallback)
      if: steps.download.outputs.status == 'fallback'
      shell: bash
      run: |
        echo "Building dep from source..."

        cd "$GITHUB_ACTION_PATH"
        make clean || true
        make dep

        mkdir -p "${GITHUB_ACTION_PATH}/dist"
        mv dep "${GITHUB_ACTION_PATH}/dist/dep"

    - name: Make executable
      shell: bash
      run: chmod +x "${GITHUB_ACTION_PATH}/dist/dep"

    - name: Extend executable path
      shell: bash
      run: echo "${GITHUB_ACTION_PATH}/dist" >> $GITHUB_PATH
